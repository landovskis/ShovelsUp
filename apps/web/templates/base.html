<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ShovelsUp{% endblock %}</title>
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/main.css">
    <script src="https://unpkg.com/htmx.org@2.0.3" integrity="sha384-0895/pl2MU10Hqc6jd4RvrthNlDiE9U1tWmX7WRESftEDRosgxNsQG/Ze9YMRzHq" crossorigin="anonymous" defer></script>
</head>
<body>
    <shovels-header data-permits="{{ nav_permits }}" data-council="{{ nav_council }}"></shovels-header>
    <main class="{% block main_class %}site-main{% endblock %}">
        {% block content %}{% endblock %}
    </main>
    <script type="module" src="/static/js/components.js"></script>
</body>
</html>
